{% extends 'layout.html' %}

{% block title %}
Music List
{% endblock %}

{% block content %}

<h1>Music List</h1>

<a href="/music/create"> Create new music </a>

<ul>
{% for music in music_list %}

<ul>

</ul>

</li>

{% endfor %}
</ul>
{% endblock %}
